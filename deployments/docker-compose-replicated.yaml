services:
  sm-app:
    container_name: sm-app
    build:
      context: .
      dockerfile: build/package/Dockerfile
    ports:
      - "8282:8080"
    networks:
      - pgnet
    env_file:
      - .env
    depends_on:
      sm-db-main:
        condition: service_healthy
      sm-db-sl1:
        condition: service_healthy
      sm-db-sl2:
        condition: service_healthy

  sm-db-main:
    container_name: sm-db
    image: postgres:18
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - pgnet
    volumes:
      - sm-data-master:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker
      PGUSER: replicator
      PGPASSWORD: pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=4
      -c max_replication_slots=4
      -c wal_keep_size=1024MB
#      -c synchronous_commit=on
#      -c synchronous_standby_names='FIRST 1 ("sm-db-sl1", "sm-db-sl2")'

  sm-db-sl1:
    container_name: sm-db-sl1
    image: postgres:18
    user: root
    depends_on:
      - sm-db-main
    ports:
      - "5434:5432"
    restart: unless-stopped
    networks:
      - pgnet
    volumes:
      - sm-data-sl1:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker
      PGUSER: replicator
      PGPASSWORD: pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    entrypoint:
      - bash
      - -c
      - |
        TARGET_DIR="/var/lib/postgresql/18/docker"

        if [ ! -s "$${TARGET_DIR}/PG_VERSION" ]; then
          echo "=== Папка пуста. Начинаем клонирование мастера... ==="
          
          until pg_isready -h sm-db -p 5432 -U replicator -d "$${POSTGRES_DB}"; do
            echo "Ожидание готовности мастера..."
            sleep 3
          done

          # Бесконечный цикл клонирования, пока команда не выполнится со статусом 0 (успех)
          while true; do
            # Гарантируем права перед стартом утилиты
            mkdir -p "$${TARGET_DIR}"
            chmod 700 "$${TARGET_DIR}"
            chown -R 999:999 /var/lib/postgresql

            echo "Запуск pg_basebackup..."
            if gosu postgres pg_basebackup -h sm-db -D "$${TARGET_DIR}" -U replicator -F p -P -R -X stream; then
              echo "=== Клонирование завершено успешно! ==="
              break
            else
              echo "!!! Ошибка pg_basebackup. Очистка прав и повтор через 5 секунд... !!!"
              chown -R 999:999 /var/lib/postgresql
              sleep 5
            fi
          done
        else
          echo "=== Обнаружены существующие данные. Обычный запуск реплики... ==="
        fi

        # Финальный сброс прав перед передачей управления Postgres
        chown -R 999:999 /var/lib/postgresql
        exec gosu postgres docker-entrypoint.sh postgres -c primary_conninfo='host=sm-db port=5432 user=replicator password=pass application_name=sm-db-sl1'
  sm-db-sl2:
    container_name: sm-db-sl2
    image: postgres:18
    user: root
    depends_on:
      - sm-db-main
    ports:
      - "5435:5432"
    restart: unless-stopped
    networks:
      - pgnet
    volumes:
      - sm-data-sl2:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker
      PGUSER: replicator
      PGPASSWORD: pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    entrypoint:
      - bash
      - -c
      - |
        TARGET_DIR="/var/lib/postgresql/18/docker"

        if [ ! -s "$${TARGET_DIR}/PG_VERSION" ]; then
          echo "=== Папка пуста. Начинаем клонирование мастера... ==="
          
          until pg_isready -h sm-db -p 5432 -U replicator -d "$${POSTGRES_DB}"; do
            echo "Ожидание готовности мастера..."
            sleep 3
          done

          # Бесконечный цикл клонирования, пока команда не выполнится со статусом 0 (успех)
          while true; do
            # Гарантируем права перед стартом утилиты
            mkdir -p "$${TARGET_DIR}"
            chmod 700 "$${TARGET_DIR}"
            chown -R 999:999 /var/lib/postgresql

            echo "Запуск pg_basebackup..."
            if gosu postgres pg_basebackup -h sm-db -D "$${TARGET_DIR}" -U replicator -F p -P -R -X stream; then
              echo "=== Клонирование завершено успешно! ==="
              break
            else
              echo "!!! Ошибка pg_basebackup. Очистка прав и повтор через 5 секунд... !!!"
              chown -R 999:999 /var/lib/postgresql
              sleep 5
            fi
          done
        else
          echo "=== Обнаружены существующие данные. Обычный запуск реплики... ==="
        fi

        # Финальный сброс прав перед передачей управления Postgres
        chown -R 999:999 /var/lib/postgresql
        exec gosu postgres docker-entrypoint.sh postgres -c primary_conninfo='host=sm-db port=5432 user=replicator password=pass application_name=sm-db-sl2'

networks:
  pgnet:
    driver: bridge

volumes:
  sm-data-master:
  sm-data-sl1:
  sm-data-sl2:
