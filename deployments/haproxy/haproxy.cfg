global
    log stdout local0
    maxconn 200

defaults
    log global
    mode tcp
    retries 2
    timeout connect 5s
    timeout client  30m
    timeout server  30m
    timeout check   5s

# Stats dashboard at http://localhost:7000
listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /
    stats refresh 5s
    stats show-node

# Write traffic → current Patroni primary only.
# HAProxy sends GET /primary to each node's REST API (port 8008);
# Patroni returns 200 only on the leader, 503 otherwise.
frontend pg_write
    bind *:5432
    default_backend pg_primary

backend pg_primary
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-node1 patroni-node1:5432 maxconn 100 check port 8008
    server patroni-node2 patroni-node2:5432 maxconn 100 check port 8008
    server patroni-node3 patroni-node3:5432 maxconn 100 check port 8008

# Read traffic → Patroni replicas (round-robin).
# GET /replica returns 200 only on streaming replicas.
frontend pg_read
    bind *:5433
    default_backend pg_replicas

backend pg_replicas
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-node1 patroni-node1:5432 maxconn 100 check port 8008
    server patroni-node2 patroni-node2:5432 maxconn 100 check port 8008
    server patroni-node3 patroni-node3:5432 maxconn 100 check port 8008
