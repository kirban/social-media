services:
  sm-app:
    container_name: sm-app
    build:
      context: .
      dockerfile: build/package/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      sm-db:
        condition: service_healthy

  sm-db:
    container_name: sm-db
    image: postgres:18
    ports:
      - "5432:5432"
    volumes:
      - sm-data:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  sm-data: